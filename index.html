<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Trier Digital Twin — Live Intelligence Platform</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --gold: #d4b483; --gold-dim: #8a6a40; --bg: #070608; --panel: rgba(10,9,12,0.95);
      --border: rgba(212,180,131,0.2); --text: #c8b99a; --muted: #5a4f3f;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Raleway',sans-serif; background:var(--bg); color:var(--text); overflow:hidden; }
    #cesiumContainer { width:100vw; height:100vh; }
    
    /* DASHBOARD UI */
    #topBar { position:absolute; top:0; left:0; right:0; height:50px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 20px; z-index:20; }
    #topBar h1 { font-family:'Cinzel',serif; font-size:1.2rem; color:var(--gold); letter-spacing:0.1em; }
    
    .panel { position:absolute; top:60px; background:var(--panel); backdrop-filter:blur(15px); border:1px solid var(--border); padding:20px; z-index:15; }
    #leftPanel { left:10px; width:240px; height:calc(100vh - 80px); }
    #rightPanel { right:10px; width:300px; height:calc(100vh - 80px); }
    
    h3 { font-family:'Cinzel',serif; font-size:0.75rem; color:var(--gold); margin-bottom:15px; border-bottom:1px solid var(--border); padding-bottom:5px; }
    .stat-row { display:flex; justify-content:space-between; margin-bottom:10px; font-size:0.85rem; font-family:'JetBrains Mono'; }
    .pill { padding:2px 8px; border-radius:4px; font-size:0.7rem; border:1px solid var(--border); }
    .active { color:#5a9e6f; border-color:#5a9e6f; }
    
    .btn { background:transparent; border:1px solid var(--gold); color:var(--gold); padding:8px; width:100%; margin-top:10px; cursor:pointer; font-family:'Cinzel'; font-size:0.7rem; transition:0.3s; }
    .btn:hover { background:var(--gold); color:var(--bg); }
  </style>
</head>
<body>

<div id="topBar">
  <h1>TRIER DIGITAL TWIN <span style="font-size:0.7rem; opacity:0.6; margin-left:10px;">V3.5 LIVE</span></h1>
  <div id="clock" style="margin-left:auto; font-family:'JetBrains Mono'; font-size:0.8rem;">18:00:40</div>
</div>

<div id="leftPanel" class="panel">
  <h3>Data Layers</h3>
  <div class="stat-row"><span>3D Buildings</span><span class="pill active">SYNCED</span></div>
  <div class="stat-row"><span>Roman Structures</span><span class="pill">INACTIVE</span></div>
  <button class="btn" onclick="setMode('historic')">ENTER HISTORIC MODE</button>
  <button class="btn" onclick="setMode('modern')">MODERN ANALYTICS</button>
  
  <div style="margin-top:30px;">
    <h3>Era Timeline</h3>
    <input type="range" style="width:100%" min="100" max="2026" value="2026">
  </div>
</div>

<div id="rightPanel" class="panel">
  <h3>Live Intelligence</h3>
  <div class="stat-row"><span>Temperature</span><span id="temp-val">--°C</span></div>
  <div class="stat-row"><span>Traffic Index</span><span id="traffic-val">Stable</span></div>
  
  <div style="margin-top:20px;">
    <h3>Population Growth</h3>
    <canvas id="growthChart" height="200"></canvas>
  </div>
</div>

<div id="cesiumContainer"></div>

<script>
// 1. CONFIG (PASTE YOUR ACTUAL TOKEN HERE)
const CESIUM_TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI2ZmNiYWYwOC1jNWNjLTQ0MTUtODE1Yi1mODE5ZDkxYjg3M2EiLCJpZCI6NDIwMzA1LCJpYXQiOjE3NzY2NzIwMjB9.9ppB2f-92AwmmBvmq9ID5g14xGQvTCzJ5ksc2H2PLSQ";
const BUILDING_ID = 2903332; // Your Asset ID from image_e268b5.png

Cesium.Ion.defaultAccessToken = CESIUM_TOKEN;

// 2. INITIALIZE VIEWER
const viewer = new Cesium.Viewer('cesiumContainer', {
    terrain: Cesium.Terrain.fromWorldTerrain(),
    baseLayerPicker: false, geocoder: false, homeButton: false,
    infoBox: false, selectionIndicator: true, timeline: false, animation: false
});

viewer.scene.globe.enableLighting = true;

// 3. LOAD TRIER BUILDINGS
async function loadCity() {
    try {
        const buildingTileset = await Cesium.Cesium3DTileset.fromIonAssetId(BUILDING_ID);
        viewer.scene.primitives.add(buildingTileset);

        // Styling: Tall buildings (churches/historic) = Gold, Others = Bisque
        buildingTileset.style = new Cesium.Cesium3DTileStyle({
            color: {
                conditions: [
                    ["${height} >= 15", "color('#d4b483', 0.9)"],
                    ["true", "color('#f5f5dc', 0.8)"]
                ]
            }
        });

        // Fly to Trier
        viewer.camera.flyTo({
            destination: Cesium.Cartesian3.fromDegrees(6.6413, 49.7596, 1200),
            orientation: { pitch: Cesium.Math.toRadians(-35) }
        });
        
        console.log("Trier Digital Twin Live!");
    } catch (error) {
        console.error("Error loading buildings:", error);
    }
}

// 4. LIVE WEATHER (OpenWeatherMap)
async function updateWeather() {
    const lat = 49.75; const lon = 6.64;
    const key = "835d66406dc29ab7dafc6e8fc3cccc95";
    try {
        const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${key}&units=metric`);
        const data = await response.json();
        document.getElementById('temp-val').innerText = `${Math.round(data.main.temp)}°C`;
    } catch(e) { document.getElementById('temp-val').innerText = "Offline"; }
}

// 5. CHART INITIALIZATION
const ctx = document.getElementById('growthChart').getContext('2d');
new Chart(ctx, {
    type: 'line',
    data: {
        labels: ['100AD', '300AD', '2024'],
        datasets: [{
            data: [40, 80, 118],
            borderColor: '#d4b483',
            tension: 0.4
        }]
    },
    options: { plugins: { legend: { display: false } }, scales: { y: { display: false } } }
});

// Run Init
loadCity();
updateWeather();
setInterval(() => {
    document.getElementById('clock').innerText = new Date().toLocaleTimeString('de-DE');
}, 1000);

function setMode(mode) {
    console.log("Switching to", mode);
    // Add logic here to toggle visibility of Roman vs Modern layers later!
}
</script>
</body>
</html>
